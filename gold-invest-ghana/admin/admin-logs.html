<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Logs - Fund Additions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand"><i class="fas fa-history"></i> Admin Fund Logs</a>
        <button id="adminLogout" class="btn btn-danger">Logout</button>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>💰 Fund Addition History</h3>
        <button class="btn btn-outline-secondary" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
    <div class="table-responsive">
        <table class="table table-bordered table-striped" id="logsTable">
            <thead class="table-dark">
                <tr><th>Date & Time</th><th>User ID</th><th>User Phone</th><th>Amount Added</th><th>Old Balance</th><th>New Balance</th></tr>
            </thead>
            <tbody>
                <tr><td colspan="6" class="text-center">Loading...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="mt-3">
        <a href="index.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        <button class="btn btn-danger" id="clearLogsBtn"><i class="fas fa-trash-alt"></i> Clear All Logs</button>
    </div>
</div>

<script src="../assets/js/db.js"></script>
<script src="assets/js/admin-common.js"></script>
<script>
    function loadLogs() {
        const logs = JSON.parse(localStorage.getItem('admin_funds_log') || '[]');
        const users = getUsers(); // to map userId to phone
        const tbody = document.querySelector('#logsTable tbody');
        if (!tbody) return;
        
        if (logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No fund addition records found.</td></tr>';
            return;
        }
        
        tbody.innerHTML = '';
        logs.reverse().forEach(log => {
            const user = users.find(u => u.id === log.userId);
            const userPhone = user ? user.phone : 'Unknown';
            const row = `<tr>
                <td>${new Date(log.timestamp).toLocaleString()}</td>
                <td>${log.userId}</td>
                <td>${userPhone}</td>
                <td><span class="text-success fw-bold">+₵${log.amountAdded.toFixed(2)}</span></td>
                <td>₵${log.oldBalance.toFixed(2)}</td>
                <td><span class="text-primary fw-bold">₵${log.newBalance.toFixed(2)}</span></td>
            </tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        });
    }

    // Clear logs
    document.getElementById('clearLogsBtn')?.addEventListener('click', () => {
        if (confirm('⚠️ Are you sure you want to delete ALL fund addition logs? This action cannot be undone.')) {
            localStorage.removeItem('admin_funds_log');
            loadLogs();
            alert('Logs cleared successfully.');
        }
    });

    // Logout handler
    document.getElementById('adminLogout')?.addEventListener('click', () => {
        localStorage.removeItem('admin_session');
        window.location.href = 'login.html';
    });

    loadLogs();
</script>
</body>
</html>
