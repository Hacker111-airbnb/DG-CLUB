<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Admin Settings</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-dark"><div class="container"><a class="navbar-brand">Settings</a><button id="adminLogout" class="btn btn-danger">Logout</button></div></nav>
<div class="container mt-4">
    <div class="card"><div class="card-body">
        <h5>Change Admin Password</h5>
        <form id="changePassForm">
            <input type="password" id="newPass" class="form-control mb-2" placeholder="New Password">
            <button class="btn btn-primary">Update</button>
        </form>
        <hr>
        <h5>Export Data</h5>
        <button class="btn btn-secondary" onclick="exportData()">Export JSON</button>
    </div></div>
</div>
<script src="../assets/js/db.js"></script>
<script src="assets/js/admin-common.js"></script>
<script>
    document.getElementById('changePassForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const newPass = document.getElementById('newPass').value;
        if (newPass) {
            alert('Password change not implemented in demo. In production, store hashed password.');
        }
    });
    function exportData() {
        const data = { users: getUsers(), deposits: getDeposits() };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'goldinvest_data.json';
        a.click();
    }
</script>
</body>
</html>
