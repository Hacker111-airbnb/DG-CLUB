<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand"><i class="fas fa-users"></i> User Management</a>
        <button id="adminLogout" class="btn btn-danger">Logout</button>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>All Registered Users</h3>
        <button class="btn btn-outline-primary" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
    <div class="table-responsive">
        <table class="table table-bordered table-striped" id="usersTable">
            <thead class="table-dark">
                <tr>
                    <th>Phone</th>
                    <th>Username</th>
                    <th>Balance (₵)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="4" class="text-center">Loading...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="mt-3">
        <a href="index.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</div>
<script src="../assets/js/db.js"></script>
<script src="assets/js/admin-common.js"></script>
<script src="assets/js/admin-users.js"></script>
</body>
</html>
